name: Android APK Export

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "android-apk"
  cancel-in-progress: true

env:
  APP_NAME: "złAPP Koziołka"
  APP_ID: "com.example.zlappkoziolka"
  WEB_DIR: "dist"
  NODE_VERSION: "22"
  JAVA_VERSION: "21"

jobs:
  android-apk-export:
    name: Android APK Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build React Application
        run: |
          echo "[INFO] Initialising NPM installation..."
          npm install
          echo "[INFO] Commencing Webpack build..."
          npm run build

      - name: Initialise Capacitor Environment
        run: |
          echo "[INFO] Fetching Capacitor dependencies..."
          npm install @capacitor/core @capacitor/cli @capacitor/android
          echo "[INFO] Initialising Capacitor configuration..."
          npx cap init "${APP_NAME}" "${APP_ID}" --web-dir "${WEB_DIR}"
          echo "[INFO] Generating Android project structure..."
          npx cap add android
          echo "[INFO] Injecting Android location permissions..."
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-feature android:name="android.hardware.location.gps" />' android/app/src/main/AndroidManifest.xml
          npx cap sync android

      - name: Assemble Android Package
        run: |
          echo "[INFO] Commencing Gradle debug build..."
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK File
        run: |
          echo "[INFO] Renaming APK file..."
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/zlapp-koziolka.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zlapp-koziolka-apk
          path: android/app/build/outputs/apk/debug/zlapp-koziolka.apk
